# HOCA Docker Compose — optional local services.
#
# Profiles:
#   webhook  — isolated webhook listener for GitHub event-driven runs
#   sandbox  — build the worker sandbox image (used by HOCA_USE_SANDBOX=true)
#
# Ollama is intentionally excluded — run it natively via `ollama serve`.
#
# Usage:
#   docker compose --profile webhook up        # start webhook listener
#   docker compose --profile webhook down       # stop
#   docker compose --profile sandbox build     # build sandbox image
#   bin/hoca run /path/to/repo "task"          # uses sandbox automatically

services:
  webhook-listener:
    image: python:3.12-slim
    profiles:
      - webhook
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir flask python-dotenv &&
             python scripts/webhook-listener.py"
    env_file:
      - .env
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./hoca:/app/hoca:ro
      - ./bin:/app/bin:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp

  sandbox:
    build:
      context: ./docker
      dockerfile: Dockerfile.sandbox
    image: hoca-sandbox:latest
    profiles:
      - sandbox
    command: "echo 'Sandbox image built successfully.'"
