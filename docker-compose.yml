# HOCA Docker Compose — optional local services.
#
# The webhook listener is better run directly on the host when it needs
# to launch host-level hoca, Docker, or Ollama commands.  Use the
# "webhook" profile only when you want an isolated listener that
# forwards events without spawning host processes.
#
# Ollama is intentionally excluded — run it natively via `ollama serve`.
#
# Usage:
#   docker compose --profile webhook up        # start webhook listener
#   docker compose --profile webhook down       # stop

services:
  webhook-listener:
    image: python:3.12-slim
    profiles:
      - webhook
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir flask python-dotenv &&
             python scripts/webhook-listener.py"
    env_file:
      - .env
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./scripts:/app/scripts:ro
      - ./hoca:/app/hoca:ro
      - ./bin:/app/bin:ro
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
