# Example Hermes configuration for the hoca-worker profile.
# Copy relevant sections into the profile's real config.yaml and replace
# placeholder paths. Do not put secrets in this file.

terminal:
  backend: local

skills:
  external_dirs:
    - "~/<path-to-workspace>/hoca/hermes-skills"

# Worker profile: implementation only. No PR or merge scripts in defaults.

hoca:
  role: worker
  workspace_root: "~/<path-to-target-repos>"
  default_model: "qwen2.5-coder:14b"
  openhands_runner: "~/<path-to-workspace>/hoca/scripts/run-openhands-sandboxed.sh"
  test_runner: "~/<path-to-workspace>/hoca/scripts/run-tests.sh"

  safety:
    auto_merge: false
    require_tests: true
    require_review_lgtm: true
    stop_on_dirty_tree: true
