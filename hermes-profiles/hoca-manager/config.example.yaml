# Example Hermes configuration for the hoca-manager profile.
# Copy relevant sections into the profile's real config.yaml and replace
# placeholder paths. Do not put secrets in this file.

terminal:
  backend: docker
  docker_image: "nikolaik/python-nodejs:python3.12-nodejs22"
  docker_mount_cwd_to_workspace: false
  docker_run_as_host_user: true
  docker_forward_env:
    - GITHUB_TOKEN
    - LLM_MODEL
    - LLM_BASE_URL
    - LLM_API_KEY
    - OLLAMA_API_BASE
    - TELEGRAM_BOT_TOKEN
    - TELEGRAM_CHAT_ID
    - HOCA_AUTO_MERGE
    - HOCA_NOTIFY_TELEGRAM
    - HOCA_MAX_TOTAL_ROUNDS
  docker_volumes:
    - "~/<path-to-workspace>/hoca:/workspace/hoca"
    - "~/<path-to-target-repos>:/workspace/projects"
  container_cpu: 6
  container_memory: 16384
  container_persistent: true

skills:
  external_dirs:
    - "~/<path-to-workspace>/hoca/hermes-skills"

# Manager profile: full orchestration tool surface. Narrow MCP roots at install time.
# See https://hermes.dhuar.com/en/guides/use-mcp-with-hermes/

hoca:
  role: manager
  workspace_root: "~/<path-to-target-repos>"
  default_model: "qwen2.5-coder:14b"
  openhands_runner: "~/<path-to-workspace>/hoca/scripts/run-openhands-task.sh"
  code_reviewer: "~/<path-to-workspace>/hoca/scripts/review-with-openhands.sh"
  test_runner: "~/<path-to-workspace>/hoca/scripts/run-tests.sh"
  pr_creator: "~/<path-to-workspace>/hoca/scripts/create-pr.sh"
  notifier: "~/<path-to-workspace>/hoca/scripts/notify.sh"
  task_runner: "~/<path-to-workspace>/hoca/scripts/run-hoca-task.sh"

  safety:
    auto_merge: false
    require_tests: true
    require_review_lgtm: true
    stop_on_dirty_tree: true
